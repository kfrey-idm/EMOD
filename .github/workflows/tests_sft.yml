name: Tests - SFTs

on:
  workflow_dispatch:
    inputs:
      sft_test_cores:
        description: 'Number of cores to run SFT tests with'
        required: false
        default: '4'
      sft_test_options:
        description: 'Additional SFT test command-line options'
        required: false
        default: '--scons --use-dlls'
      run_generic_science:
        description: 'Run Generic Science suite'
        required: false
        type: boolean
        default: true
      run_hiv_science:
        description: 'Run HIV Science suite'
        required: false
        type: boolean
        default: true
      run_malaria_science:
        description: 'Run Malaria Science suite'
        required: false
        type: boolean
        default: true
      run_sti_science:
        description: 'Run STI Science suite'
        required: false
        type: boolean
        default: true
      run_vector_science:
        description: 'Run Vector Science suite'
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build and create artifacts
    uses: ./.github/workflows/reusable_build_archive.yml
    with:
      disease_type: 'All'
      science_test: '--TestSugar'

  setup:
    name: Configure Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build suite matrix
        id: set-matrix
        run: |
          includes='[]'
          if [ "${{ inputs.run_generic_science }}" = "true" ]; then
            includes=$(echo "$includes" | jq '. += [{"name":"Generic Science","suite":"generic_science"}]')
          fi
          if [ "${{ inputs.run_hiv_science }}" = "true" ]; then
            includes=$(echo "$includes" | jq '. += [{"name":"HIV Science","suite":"hiv_science"}]')
          fi
          if [ "${{ inputs.run_malaria_science }}" = "true" ]; then
            includes=$(echo "$includes" | jq '. += [{"name":"Malaria Science","suite":"malaria_science"}]')
          fi
          if [ "${{ inputs.run_sti_science }}" = "true" ]; then
            includes=$(echo "$includes" | jq '. += [{"name":"STI Science","suite":"sti_science"}]')
          fi
          if [ "${{ inputs.run_vector_science }}" = "true" ]; then
            includes=$(echo "$includes" | jq '. += [{"name":"Vector Science","suite":"vector_science"}]')
          fi
          echo "matrix=$(echo "$includes" | jq -c '{include: .}')" >> $GITHUB_OUTPUT

  test:
    name: Test - ${{ matrix.name }}
    needs: [build, setup]
    if: ${{ always() && needs.build.result == 'success' && needs.setup.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download executable
        uses: actions/download-artifact@v7
        with:
          name: Eradication
          path: build/x64/Release/Eradication/
      - name: Restore executable permissions
        run: |
          echo "Checking downloaded artifact structure..."
          ls -la build/x64/Release/Eradication/
          chmod +x build/x64/Release/Eradication/Eradication
          echo "✓ Permissions restored"

      - name: Run SFT Tests
        id: sft_tests
        continue-on-error: true
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            -v "${{ github.workspace }}:/EMOD" \
            ghcr.io/emod-hub/emod-ubuntu-runtime:latest \
            bash -c "\
              cd /EMOD && \
              mkdir -p /EMOD/sft_test_output && \
              echo 'Running ${{ matrix.name }} SFT tests' && \
              cd Regression && \
              python3 regression_test.py \
                ${{ matrix.suite }} \
                ../build/x64/Release/Eradication/Eradication \
                --hidegraphs --config-constraints Num_Cores:${{ inputs.sft_test_cores }} \
                ${{ inputs.sft_test_options }} \
                --local \
                --linux \
            "

      - name: Check Test Results
        if: always()
        run: |
          echo "=== Looking for regression test reports ==="

          REPORT_FILE=$(find Regression/reports -name "report_*.xml" 2>/dev/null | head -1)

          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            FAILURES=$(grep -oP 'failures="\K[0-9]+' "$REPORT_FILE" || echo "0")
            ERRORS=$(grep -oP 'errors="\K[0-9]+' "$REPORT_FILE" || echo "0")
            TESTS=$(grep -oP 'tests="\K[0-9]+' "$REPORT_FILE" || echo "0")

            echo "Test Summary (${{ matrix.name }}):"
            echo "  Total tests: $TESTS"
            echo "  Failures:    $FAILURES"
            echo "  Errors:      $ERRORS"
            echo ""

            if [ "$FAILURES" != "0" ] || [ "$ERRORS" != "0" ]; then
              echo "=== Failing Tests ==="
              python3 -c "import xml.etree.ElementTree as ET,sys;root=ET.parse(sys.argv[1]).getroot();[print(('[ERROR] ' if tc.find('error') is not None else '[FAIL]  ')+tc.get('name','?')+('\n        '+(tc.find('error') if tc.find('error') is not None else tc.find('failure')).text.strip() if (tc.find('error') if tc.find('error') is not None else tc.find('failure')).text and (tc.find('error') if tc.find('error') is not None else tc.find('failure')).text.strip() else '')) for tc in root.findall('testcase') if tc.find('error') is not None or tc.find('failure') is not None]" "$REPORT_FILE"
              echo ""
              echo "❌ ${{ matrix.name }} SFT TESTS FAILED ($FAILURES failed, $ERRORS errored)"
              exit 1
            else
              echo "✅ All $TESTS ${{ matrix.name }} SFT tests passed!"
            fi
          else
            echo "⚠️  No report found at Regression/reports/report_*.xml"
            echo "Test step outcome: ${{ steps.sft_tests.outcome }}"

            if [ "${{ steps.sft_tests.outcome }}" != "success" ]; then
              echo "❌ ${{ matrix.name }} SFT tests failed to complete"
              exit 1
            else
              echo "⚠️  Tests completed but no report was generated"
              echo "This may indicate the test suite was empty or had configuration issues"
            fi
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: emod-${{ matrix.name }}-regression-test-results
          path: |
            regression_test_output/
            Regression/reports/
          retention-days: 7
          if-no-files-found: ignore
