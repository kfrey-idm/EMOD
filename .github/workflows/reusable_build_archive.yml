name: Workflow - Build EMOD; create artifacts

on:
  # Allows re-use in other workflows
  workflow_call:
    inputs:
      disease_type:
        required: true
        type: string
      science_test:
        required: true
        type: string
      dev_version:
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SCONS_OPTION: ${{ inputs.disease_type != 'All' && format('--Disease={0}', inputs.disease_type) || ' ' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build executable
        uses: docker://docker-production.packages.idmod.org:443/idm/dtk-centos-buildenv:3.0
        with:
          args: "scons --Release --jobs=4 ${{ env.SCONS_OPTION }} ${{ inputs.science_test }}"
      - name: Strip executable
        uses: docker://docker-production.packages.idmod.org:443/idm/dtk-centos-buildenv:3.0
        with:
          args: "strip ./build/x64/Release/Eradication/Eradication"
      - name: Generate schema
        uses: docker://docker-production.packages.idmod.org:443/idm/dtk-centos-buildenv:3.0
        with:
          args: "./build/x64/Release/Eradication/Eradication --get-schema --schema-path schema.json"
      - name: Generate version file
        run: |
          grep DTK_Version schema.json | sed 's/[^0-9.]//g' > version
          if [ -n "${{ inputs.dev_version }}" ]; then
            if ! echo "${{ inputs.dev_version }}" | grep -qE '^[0-9]+$'; then
              echo "::error::dev_version must be a non-negative integer, got '${{ inputs.dev_version }}'"
              exit 1
            fi
            VERSION=$(cat version)
            echo "${VERSION}.dev${{ inputs.dev_version }}" > version
            echo "Development version: $(cat version)"
          fi
      - name: Archive binary
        uses: actions/upload-artifact@v7
        with:
          name: Eradication
          path: ./build/x64/Release/Eradication/Eradication
          retention-days: 7
      - name: Archive schema
        uses: actions/upload-artifact@v7
        with:
          name: schema.json
          path: schema.json
          retention-days: 7
      - name: Archive version
        uses: actions/upload-artifact@v7
        with:
          name: version
          path: version
          retention-days: 7
      - name: Archive sti reporter dll
        if: ${{ inputs.disease_type == 'All' || inputs.disease_type == 'HIV' || inputs.disease_type == 'STI' }}
        uses: actions/upload-artifact@v7
        with:
          name: reporter_plugins
          path: ./build/x64/Release/reporter_plugins
          retention-days: 7
      - name: Archive component tests
        if: ${{ inputs.disease_type == 'All' }}
        uses: actions/upload-artifact@v7
        with:
          name: componentTests
          path: ./build/x64/Release/componentTests/componentTests
          retention-days: 7
