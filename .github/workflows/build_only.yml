name: Build EMOD - Release or TestSugar

on:
  # Allows manual run from the Actions tab
  workflow_dispatch:
    inputs:
      disease_type:
        description: 'Disease type in SCons build'
        type: choice
        options:
          - 'All'
          - 'Generic'
          - 'HIV'
          - 'Malaria'
      science_test:
        description: 'TestSugar build'
        type: choice
        options:
          - ' '
          - '--TestSugar'
      development:
        description: 'development version (appends .devN to version)'
        required: false
        type: boolean
        default: false
      dev_number:
        description: 'Dev version number N (used when development is true, e.g. 1 for .dev1)'
        required: false
        type: string
        default: '0'

jobs:
  build_artifacts:
    name: Build and create artifacts
    uses: ./.github/workflows/reusable_build_archive.yml
    with:
      disease_type: ${{ inputs.disease_type }}
      science_test: ${{ inputs.science_test }}
      dev_version: ${{ inputs.development == true && inputs.dev_number || '' }}
